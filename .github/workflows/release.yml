name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '4.0'
          bundler-cache: true
      - name: Run tests
        run: bundle exec rspec
      - name: Verify tag matches gemspec version
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          GEM_VERSION=$(ruby -e "puts Gem::Specification.load('git-deploy-ng.gemspec').version")
          if [ "$TAG_VERSION" != "$GEM_VERSION" ]; then
            echo "::error::Tag v${TAG_VERSION} does not match gemspec version ${GEM_VERSION}"
            exit 1
          fi
      - name: Verify CHANGELOG documents this release
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          ruby bin/update-changelog "$VERSION" --check
      - name: Prepare GitHub release notes
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          export VERSION
          ruby -r ./lib/git_deploy/changelog -e "
            body = GitDeploy::Changelog.extract_section(File.read('CHANGELOG.md'), ENV.fetch('VERSION'))
            abort 'Empty CHANGELOG section' if body.nil? || body.strip.empty?
            File.write('release-notes.md', body)
          "
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
      - name: Publish to RubyGems
        uses: rubygems/release-gem@v1
        env:
          GEM_HOST_API_KEY: ${{ secrets.RUBYGEMS_API_KEY }}
